<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./style/home.css">
    <link rel="stylesheet" href="./style/login.css">
</head>
<body>
    <header>
        <div class="logo-title">
            <div class="logo"><a href="./home.html"><img src="./image/logo.jpg" alt="logo"> </a></div>
            <div class="title"><a href="./home.html">Media Market</a></h1></div>
        </div>
        <nav class="navigate">
            <a href="" class="about"><p>About</p></a>
            <a href="" class="contact"><p>Contact</p></a>
            <a href="" class="feedback"><p>Feedback</p></a>
        </nav>
        <div class="login-signup">
            <a href="./signup.html"><button>Sign up</button></a>
        </div>
    </header>
    <div  class="wrapper">
        <form>
            <h1>
                Login
            </h1>

            <div class="input-box">
                <input type="text" placeholder="Username" class="js-login-username"  >
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" class="js-login-password">
            </div>
            <div class="remember-forget">
                <label>
                     <input type="checkbox" name="" id=""> Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>
            <div >
                <button type="button" class="btn js-login-btn">Login</button>
            </div>
            <div class="register-link">
                <p>Don't have an account <a href="signup.html">Sign Up</a></p>
            </div>
            
        </form>
    </div>

    <script type="module" src="./script/login.js"></script>
</body>
</html>
